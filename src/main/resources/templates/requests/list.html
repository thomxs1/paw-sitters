<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Anfragen</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header>
    <h1>🐾 Pawsitters</h1>
    <nav>
        <a th:href="@{/}">Start</a>
        <a th:href="@{/owners}">Tierhalter</a>
        <a th:href="@{/hosts}">Gastgeber</a>
        <a th:href="@{/pets}">Haustiere</a>
        <a th:href="@{/requests}">Anfragen</a>
        <a th:href="@{/offers}">Angebote</a>
    </nav>
</header>

<main>
    <h2>Betreuungsanfragen</h2>
    <a class="btn" th:href="@{/requests/new}">+ Neue Anfrage</a>

    <table>
        <thead>
        <tr>
            <th>ID</th><th>Haustier</th><th>Tierart</th><th>Besitzer</th>
            <th>Zeitraum</th><th>Status</th><th>Angebote</th><th>Aktionen</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${requests}">
            <td th:text="${r.id}"></td>
            <td><a th:href="@{'/requests/' + ${r.id}}" th:text="${r.pet.name}"></a></td>
            <td th:text="${r.pet.animalType}"></td>
            <td th:text="${r.pet.owner.name}"></td>
            <td>
                <span th:text="${r.startDate}"></span> &ndash;
                <span th:text="${r.endDate}"></span>
            </td>
            <td><span th:class="'status-' + ${r.status}" th:text="${r.status}"></span></td>
            <td th:text="${#lists.size(r.offers)}"></td>
            <td>
                <a class="btn" th:href="@{'/offers/new?requestId=' + ${r.id}}">Angebot senden</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="8">Keine Anfragen vorhanden.</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
