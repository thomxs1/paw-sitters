<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Angebot senden</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header>
    <h1>🐾 Pawsitters</h1>
    <nav><a th:href="@{/requests}">Zur Anfrageliste</a></nav>
</header>

<main>
    <h2>Angebot zu Anfrage #<span th:text="${requestId}"></span> senden</h2>

    <div th:if="${request != null}">
        <p>
            <strong>Haustier:</strong> <span th:text="${request.pet.name}"></span>
            (<span th:text="${request.pet.animalType}"></span>)<br/>
            <strong>Zeitraum:</strong>
            <span th:text="${request.startDate}"></span> &ndash;
            <span th:text="${request.endDate}"></span>
        </p>
    </div>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/offers}" method="post">
        <input type="hidden" name="requestId" th:value="${requestId}"/>

        <label>Gastgeber
            <select name="hostId" required>
                <option value="" disabled selected>Bitte waehlen</option>
                <option th:each="h : ${hosts}" th:value="${h.id}"
                        th:text="${h.name + ' (' + h.pricePerWeek + ' €/Woche)'}"></option>
            </select>
        </label>
        <label>Gesamtpreis (€)
            <input type="number" step="0.01" min="0" name="totalPrice" required/>
        </label>
        <label>Nachricht
            <textarea name="message" placeholder="Optional"></textarea>
        </label>
        <button type="submit">Angebot senden</button>
        <a class="btn btn-secondary" th:href="@{'/requests/' + ${requestId}}">Abbrechen</a>
    </form>
</main>
</body>
</html>
